<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opetusdemo</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 60px auto; padding: 0 20px; }
        h1 { font-size: 1.8rem; margin-bottom: 8px; }
        p.intro { color: #555; margin-bottom: 32px; }
        ul { list-style: none; padding: 0; }
        li { margin-bottom: 12px; }
        a {
            display: inline-block;
            padding: 10px 20px;
            background: #0969da;
            color: white;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.95rem;
        }
        a:hover { background: #0550ae; }
        .tyhjä { color: #999; font-style: italic; }
    </style>
</head>
<body>
    <h1>Opetusdemo — webserveri</h1>
    <p class="intro">Jokainen opiskelija on lisännyt oman sivun. Klikkaa nimeä avataksesi sivu.</p>

    <ul>
        {% for o in opiskelijat %}
        <li><a href="{{ o.reitti }}">{{ o.nimi }}</a></li>
        {% else %}
        <li class="tyhjä">Ei vielä sivuja — lisää omasi!</li>
        {% endfor %}
    </ul>
</body>
</html>
