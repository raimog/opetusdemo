<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <title>Opetusdemo</title>
</head>
<body>
    <h1>Opiskelijoiden sivut</h1>
    <p>Valitse opiskelijan sivu:</p>

    <ul>
        {% for opiskelija in opiskelijat %}
            <li>
                <a href="{{ opiskelija.reitti }}">{{ opiskelija.nimi }}</a>
            </li>
        {% else %}
            <li>Ei vielä opiskelijoita listalla.</li>
        {% endfor %}
    </ul>
</body>
</html>
