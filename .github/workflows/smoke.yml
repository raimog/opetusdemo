name: Smoke Test

on:
  pull_request:
    branches: [ main ]

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Hae repo
        uses: actions/checkout@v4

      - name: Buildaa Docker image
        run: docker build -t opetusdemo .

      - name: Käynnistä container
        run: docker run -d -p 5000:5000 --name opetusdemo-app opetusdemo

      - name: Asenna Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Asenna testiriippuvuudet
        run: pip install requests

      - name: Aja smoketesti
        run: python smoke_test.py

      - name: Näytä containerin lokit jos testi epäonnistui
        if: failure()
        run: docker logs opetusdemo-app
